<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">Robotics and BCI system map</title>
  <desc id="desc">A schematic-style map connecting EEG signals, embedded firmware, electronics, ROS2, and robot hardware.</desc>
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#d8ddd7" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#1d2521" flood-opacity=".18"/>
    </filter>
  </defs>
  <rect width="1400" height="760" fill="#f6f8f5"/>
  <rect width="1400" height="760" fill="url(#grid)" opacity=".72"/>
  <g fill="none" stroke="#2d3932" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity=".85">
    <path d="M220 188H422c34 0 45 24 70 44l94 78c24 20 38 38 76 38h168"/>
    <path d="M226 438h166c40 0 62-18 86-44l88-94c25-28 45-42 84-42h192"/>
    <path d="M848 348h190c38 0 62 18 90 42l78 68"/>
    <path d="M844 258h164c42 0 62-18 86-46l74-86"/>
    <path d="M850 468h164c40 0 64 16 90 42l90 92"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="116" y="118" width="230" height="132" rx="8" fill="#ffffff" stroke="#2d3932" stroke-width="2"/>
    <rect x="116" y="368" width="230" height="132" rx="8" fill="#ffffff" stroke="#2d3932" stroke-width="2"/>
    <rect x="562" y="214" width="292" height="170" rx="8" fill="#ffffff" stroke="#2d3932" stroke-width="2"/>
    <rect x="562" y="424" width="292" height="152" rx="8" fill="#ffffff" stroke="#2d3932" stroke-width="2"/>
    <rect x="1080" y="74" width="220" height="132" rx="8" fill="#ffffff" stroke="#2d3932" stroke-width="2"/>
    <rect x="1080" y="414" width="220" height="132" rx="8" fill="#ffffff" stroke="#2d3932" stroke-width="2"/>
    <rect x="1080" y="574" width="220" height="116" rx="8" fill="#ffffff" stroke="#2d3932" stroke-width="2"/>
  </g>
  <g font-family="Inter, Arial, sans-serif" fill="#18211d">
    <text x="148" y="158" font-size="18" font-weight="700">EEG / BCI</text>
    <text x="148" y="190" font-size="14">OpenBCI/Cyton</text>
    <text x="148" y="214" font-size="14">motor-imagery streams</text>
    <text x="148" y="408" font-size="18" font-weight="700">Electronics</text>
    <text x="148" y="440" font-size="14">I2C bus behavior</text>
    <text x="148" y="464" font-size="14">pull-ups, power, signal paths</text>
    <text x="594" y="258" font-size="20" font-weight="800">Realtime Software</text>
    <text x="594" y="294" font-size="14">filtering, CSP/LDA scoring,</text>
    <text x="594" y="318" font-size="14">dry-run gates, session control</text>
    <text x="594" y="466" font-size="20" font-weight="800">Embedded Firmware</text>
    <text x="594" y="502" font-size="14">serial triggers, microcontrollers,</text>
    <text x="594" y="526" font-size="14">ROS2/micro-ROS integration</text>
    <text x="1114" y="116" font-size="18" font-weight="700">Krysalis Hand</text>
    <text x="1114" y="148" font-size="14">19-DOF robotic hand</text>
    <text x="1114" y="172" font-size="14">firmware + PCB debugging</text>
    <text x="1114" y="456" font-size="18" font-weight="700">BCI Leg Rig</text>
    <text x="1114" y="488" font-size="14">safe actuator trigger</text>
    <text x="1114" y="512" font-size="14">bench-tested control path</text>
    <text x="1114" y="616" font-size="18" font-weight="700">PyBCI</text>
    <text x="1114" y="648" font-size="14">live board streaming</text>
    <text x="1114" y="672" font-size="14">plots + recording controls</text>
  </g>
  <g fill="#d24b2a">
    <circle cx="422" cy="188" r="6"/>
    <circle cx="586" cy="310" r="6"/>
    <circle cx="842" cy="348" r="6"/>
    <circle cx="1080" cy="456" r="6"/>
  </g>
  <g fill="#0e766e">
    <circle cx="392" cy="438" r="6"/>
    <circle cx="568" cy="300" r="6"/>
    <circle cx="848" cy="258" r="6"/>
