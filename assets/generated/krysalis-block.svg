<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 560" role="img" aria-labelledby="title desc">
  <title id="title">Krysalis hand firmware and electronics debugging block diagram</title>
  <desc id="desc">A public-safe block diagram showing ROS2, embedded firmware, I2C electronics, and hand mechanisms.</desc>
  <rect width="1100" height="560" fill="#f7f8f5"/>
  <g stroke="#2f3833" stroke-width="2" fill="none" stroke-linecap="round">
    <path d="M162 286H338"/>
    <path d="M498 286H670"/>
    <path d="M830 286H962"/>
    <path d="M410 362v64h392v-64"/>
    <path d="M412 194v-56h390v56"/>
  </g>
  <g fill="#ffffff" stroke="#2f3833" stroke-width="2">
    <rect x="70" y="218" width="190" height="136" rx="8"/>
    <rect x="338" y="194" width="190" height="184" rx="8"/>
    <rect x="670" y="194" width="190" height="184" rx="8"/>
    <rect x="916" y="228" width="128" height="116" rx="8"/>
    <rect x="314" y="426" width="570" height="76" rx="8" fill="#edf4ef"/>
    <rect x="314" y="58" width="570" height="80" rx="8" fill="#fff7ed"/>
  </g>
  <g font-family="Inter, Arial, sans-serif" fill="#18211d">
    <text x="106" y="264" font-size="18" font-weight="800">ROS2 / micro-ROS</text>
    <text x="106" y="296" font-size="14">command pipeline</text>
    <text x="106" y="320" font-size="14">robotics integration</text>
    <text x="374" y="242" font-size="18" font-weight="800">Firmware</text>
    <text x="374" y="276" font-size="14">inbound/outbound</text>
    <text x="374" y="300" font-size="14">signal routing</text>
    <text x="374" y="324" font-size="14">message handling</text>
    <text x="706" y="242" font-size="18" font-weight="800">I2C Electronics</text>
    <text x="706" y="276" font-size="14">bus contention</text>
    <text x="706" y="300" font-size="14">pull-up behavior</text>
    <text x="706" y="324" font-size="14">voltage regulation</text>
    <text x="946" y="270" font-size="18" font-weight="800">Hand</text>
    <text x="946" y="302" font-size="14">19-DOF</text>
    <text x="366" y="474" font-size="16" font-weight="700">Debug loop: isolate symptoms across code, board behavior, timing, and physical hardware</text>
    <text x="366" y="106" font-size="16" font-weight="700">Public-safe case study: no private lab source, CAD, PCB files, or internal logs</text>
  </g>
  <g fill="#d24b2a">
    <circle cx="338" cy="286" r="7"/>
    <circle cx="670" cy="286" r="7"/>
    <circle cx="916" cy="286" r="7"/>
  </g>
  <g fill="#0e766e">
    <circle cx="410" cy="426" r="7"/>
    <circle cx="802" cy="426" r="7"/>
  </g>
</svg>
